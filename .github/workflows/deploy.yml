name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Änderungen auf 'main' triggern automatisches Deployment
  workflow_dispatch:  # Manueller Start auch möglich

# Berechtigungen für GitHub Pages Deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Repository auschecken
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. GitHub Pages konfigurieren
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # 3. Alle Dateien als Artifact hochladen
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Alle Dateien im Root-Verzeichnis hochladen
          path: '.'

      # 4. Auf GitHub Pages deployen
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
